<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Marcenaria | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0d0d0e;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background-color: #1a1b1e;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        .login-card .logo {
            display: block;
            margin: 0 auto 30px;
            height: 50px;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <img src="../imgs/logo-stecks.png" alt="Stecks" class="logo">
        <h2>Área Administrativa</h2>
        <div id="error" class="error-msg">Usuário ou senha incorretos.</div>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simple demo credentials
            if (user === 'admin' && pass === 'state2026') {
                localStorage.setItem('state_admin_session', 'active');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>

</html>
