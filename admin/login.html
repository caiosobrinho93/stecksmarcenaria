<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Console | Secure Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --state-gold: #EAB308;
            --state-gold-dark: #b68b06;
            --bg: #050506;
            --surface: rgba(12, 12, 14, 0.98);
            --border: rgba(234, 179, 8, 0.2);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Scanline Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(234, 179, 8, 0.03) 0%, transparent 50%, rgba(234, 179, 8, 0.03) 100%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        .login-box {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 50px;
            width: 100%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 0 50px rgba(234, 179, 8, 0.1);
        }

        .login-box::before {
            content: "STATE_CONSOLE_V5.0";
            position: absolute;
            top: -20px; left: 0;
            font-family: monospace;
            font-size: 0.6rem;
            color: var(--state-gold);
            letter-spacing: 2px;
        }

        .logo {
            display: block;
            margin: 0 auto 30px;
            height: 40px;
            filter: drop-shadow(0 0 10px var(--state-gold));
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 30px;
            color: var(--state-gold);
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            font-size: 0.65rem;
            color: var(--state-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            padding: 14px;
            color: #fff;
            outline: none;
            box-sizing: border-box;
            font-family: monospace;
        }

        input:focus {
            border-color: var(--state-gold);
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: var(--state-gold);
            color: #000;
            border: none;
            padding: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            box-shadow: 0 0 30px var(--state-gold);
            transform: scale(1.02);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 12px;
            font-size: 0.7rem;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
            text-decoration: none;
        }

        .footer-link:hover { color: var(--state-gold); }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="../imgs/logo-state.png" alt="State Marcenaria" class="logo">
        <h1 id="title-login">Acesso Restrito</h1>
        <span class="subtitle">CONSOLE_MANAGEMENT_V4.0</span>

        <div id="error-box" class="error">
            <i class="fa-solid fa-triangle-exclamation"></i> ACESSO NEGADO: CREDENCIAIS INVÁLIDAS
        </div>

        <form id="login-form">
            <div class="form-group" id="group-name" style="display:none;">
                <label>Nome Completo</label>
                <input type="text" id="name" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Operador (Login)</label>
                <input type="text" id="user" required autocomplete="username" placeholder="Seu e-mail corporativo">
            </div>
            <div class="form-group">
                <label>Chave de Segurança</label>
                <input type="password" id="pass" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit" id="btn-submit-main">
                AUTENTICAR <i class="fa-solid fa-chevron-right" style="margin-left: 5px;"></i>
            </button>
        </form>

        <a href="#" onclick="toggleRegister()" id="btn-toggle" class="footer-link" style="color:var(--state-gold); font-weight:800; margin-top:20px;">
            Novo Líder? Criar Conta Administrativa
        </a>
        <a href="../index.html" class="footer-link" style="margin-top:15px;">
            <i class="fa-solid fa-arrow-left"></i> VOLTAR AO SITE
        </a>
    </div>

    <script>
        let isRegisterMode = false;
        
        // Setup initial default DB
        let usersDB = JSON.parse(localStorage.getItem('state_users'));
        if(!usersDB) {
            usersDB = [{ u: 'admin', p: 'state2026' }];
            localStorage.setItem('state_users', JSON.stringify(usersDB));
        }

        function toggleRegister() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('title-login').innerText = isRegisterMode ? 'Cadastro Corporativo' : 'Acesso Restrito';
            document.getElementById('btn-submit-main').innerHTML = isRegisterMode ? 'VINCULAR CREDENCIAL <i class="fa-solid fa-user-plus" style="margin-left: 5px;"></i>' : 'AUTENTICAR <i class="fa-solid fa-chevron-right" style="margin-left: 5px;"></i>';
            document.getElementById('btn-toggle').innerText = isRegisterMode ? 'Já tem acesso? Retornar ao Login Seguro' : 'Novo Líder? Criar Conta Administrativa';
            document.getElementById('group-name').style.display = isRegisterMode ? 'block' : 'none';
        }

        function showError(msg, success = false) {
            const err = document.getElementById('error-box');
            err.innerHTML = `<i class="fa-solid ${success ? 'fa-check' : 'fa-triangle-exclamation'}"></i> ${msg}`;
            err.style.background = success ? 'rgba(74, 222, 128, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            err.style.color = success ? '#4ade80' : '#ef4444';
            err.style.borderColor = success ? '#4ade80' : '#ef4444';
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 3000);
        }

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const n = document.getElementById('name').value.trim();
            
            if(!u || !p) return;
            if(isRegisterMode && !n) { showError('Informe o Nome Completo.'); return; }

            let db = JSON.parse(localStorage.getItem('state_users')) || [];

            if (isRegisterMode) {
                // Check if exists
                if (db.find(x => x.u === u)) {
                    showError('Operador já cadastrado no banco central.');
                    return;
                }
                // Add new user
                db.push({ u, p, name: n, isVIP: false, avatar: '', bio: '' });
                localStorage.setItem('state_users', JSON.stringify(db));
                showError('Membro autorizado com sucesso! Entrando...', true);
                
                setTimeout(() => doLogin(u), 1500);

            } else {
                // Regular Login
                if (db.find(x => x.u === u && x.p === p)) {
                    doLogin(u);
                } else {
                    showError('ACESSO NEGADO: CREDENCIAIS INVÁLIDAS');
                }
            }
        };

        function doLogin(username) {
            localStorage.setItem('state_admin_session', 'active');
            localStorage.setItem('state_current_user', username);
            localStorage.setItem('state_last_login', new Date().toISOString());
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>

</html>
