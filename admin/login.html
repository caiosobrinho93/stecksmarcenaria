<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Console | Secure Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --state-gold: #EAB308;
            --state-gold-glow: rgba(234, 179, 8, 0.2);
            --bg-main: #0a0a09;
            --bg-glass: rgba(15, 15, 14, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #f0ebe1;
            --text-muted: #807e7a;
            --font-main: 'Inter', sans-serif;
            --font-head: 'Outfit', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 800px; height: 500px;
            background: radial-gradient(circle, var(--state-gold-glow) 0%, transparent 70%);
            z-index: -1;
            opacity: 0.5;
        }

        .login-box {
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 80px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(234, 179, 8, 0.3));
        }

        h1 {
            font-family: var(--font-head);
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 35px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--state-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 16px 16px 16px 48px;
            color: #fff;
            font-size: 1rem;
            font-family: var(--font-main);
            transition: 0.3s;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--state-gold);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px var(--state-gold-glow);
        }

        .btn-submit {
            width: 100%;
            background: var(--state-gold);
            color: #000;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--state-gold-glow);
            filter: brightness(1.1);
        }

        .btn-submit:active { transform: translateY(0); }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: none;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-links {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-link {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .footer-link:hover { color: var(--state-gold); }
        
        .footer-link.highlight {
            color: var(--state-gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="../imgs/logo-state.png" alt="State Marcenaria" class="logo">
        <h1 id="title-login">Acesso VIP</h1>
        <span class="subtitle">Console v6.9</span>

        <div id="error-box" class="error">
            <i class="fa-solid fa-triangle-exclamation"></i> ACESSO NEGADO: CREDENCIAIS INVÁLIDAS
        </div>

        <form id="login-form">
            <div class="form-group" id="group-name" style="display:none;">
                <label>Nome Completo</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="name" placeholder="Seu nome">
                </div>
            </div>
            <div class="form-group">
                <label>Operador (Login)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="user" required autocomplete="username" placeholder="Seu e-mail corporativo">
                </div>
            </div>
            <div class="form-group">
                <label>Chave de Segurança</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="pass" required autocomplete="current-password" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn-submit" id="btn-submit-main">
                AUTENTICAR <i class="fa-solid fa-chevron-right"></i>
            </button>
        </form>

        <div class="footer-links">
            <a href="#" onclick="toggleRegister()" id="btn-toggle" class="footer-link highlight">
                Novo Líder? Criar Conta Administrativa
            </a>
            <a href="../index.html" class="footer-link">
                <i class="fa-solid fa-arrow-left"></i> VOLTAR AO SITE
            </a>
        </div>
    </div>

    <script>
        let isRegisterMode = false;
        
        // Setup initial default DB
        let usersDB = JSON.parse(localStorage.getItem('state_users'));
        if(!usersDB) {
            usersDB = [{ u: 'admin', p: 'state2026' }];
            localStorage.setItem('state_users', JSON.stringify(usersDB));
        }

        function toggleRegister() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('title-login').innerText = isRegisterMode ? 'Cadastro Corporativo' : 'Acesso Restrito';
            document.getElementById('btn-submit-main').innerHTML = isRegisterMode ? 'VINCULAR CREDENCIAL <i class="fa-solid fa-user-plus" style="margin-left: 5px;"></i>' : 'AUTENTICAR <i class="fa-solid fa-chevron-right" style="margin-left: 5px;"></i>';
            document.getElementById('btn-toggle').innerText = isRegisterMode ? 'Já tem acesso? Retornar ao Login Seguro' : 'Novo Líder? Criar Conta Administrativa';
            document.getElementById('group-name').style.display = isRegisterMode ? 'block' : 'none';
        }

        function showError(msg, success = false) {
            const err = document.getElementById('error-box');
            err.innerHTML = `<i class="fa-solid ${success ? 'fa-check' : 'fa-triangle-exclamation'}"></i> ${msg}`;
            err.style.background = success ? 'rgba(74, 222, 128, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            err.style.color = success ? '#4ade80' : '#ef4444';
            err.style.borderColor = success ? '#4ade80' : '#ef4444';
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 3000);
        }

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const n = document.getElementById('name').value.trim();
            
            if(!u || !p) return;
            if(isRegisterMode && !n) { showError('Informe o Nome Completo.'); return; }

            let db = JSON.parse(localStorage.getItem('state_users')) || [];

            if (isRegisterMode) {
                // Check if exists
                if (db.find(x => x.u === u)) {
                    showError('Operador já cadastrado no banco central.');
                    return;
                }
                // Add new user
                db.push({ u, p, name: n, isVIP: false, avatar: '', bio: '' });
                localStorage.setItem('state_users', JSON.stringify(db));
                showError('Membro autorizado com sucesso! Entrando...', true);
                
                setTimeout(() => doLogin(u), 1500);

            } else {
                // Regular Login
                if (db.find(x => x.u === u && x.p === p)) {
                    doLogin(u);
                } else {
                    showError('ACESSO NEGADO: CREDENCIAIS INVÁLIDAS');
                }
            }
        };

        function doLogin(username) {
            localStorage.setItem('state_admin_session', 'active');
            localStorage.setItem('state_current_user', username);
            sessionStorage.setItem('clubstate_session', 'active');
            localStorage.setItem('state_last_login', new Date().toISOString());
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>

</html>
