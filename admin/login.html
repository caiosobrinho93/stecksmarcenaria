<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Console | Secure Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #EAB308;
            --bg: #0A0A0B;
            --surface: #121214;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.05;
            top: 20%;
            left: 20%;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .login-box::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            width: 40px;
            height: 2px;
            background: var(--accent);
            transform: translateX(-50%);
        }

        .logo {
            display: block;
            margin: 0 auto 30px;
            height: 40px;
            filter: grayscale(1) brightness(2);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 30px;
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 12px 14px;
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 10px;
            font-size: 0.75rem;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: none;
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="../imgs/logo-state.png" alt="State Marcenaria" class="logo">
        <h1>Acesso Restrito</h1>
        <span class="subtitle">CONSOLE_MANAGEMENT_V3.0</span>

        <div id="error-box" class="error">
            <i class="fa-solid fa-triangle-exclamation"></i> ACESSO NEGADO: CREDENCIAIS INVÁLIDAS
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Operador</label>
                <input type="text" id="user" required autocomplete="username" placeholder="Seu usuário">
            </div>
            <div class="form-group">
                <label>Chave de Segurança</label>
                <input type="password" id="pass" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">
                AUTENTICAR <i class="fa-solid fa-chevron-right" style="margin-left: 5px;"></i>
            </button>
        </form>

        <a href="../index.html" class="footer-link">
            <i class="fa-solid fa-arrow-left"></i> VOLTAR AO SITE
        </a>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // Secure session simulation
            if (u === 'admin' && p === 'state2026') {
                localStorage.setItem('state_admin_session', 'active');
                localStorage.setItem('state_last_login', new Date().toISOString());
                window.location.href = 'dashboard.html';
            } else {
                const err = document.getElementById('error-box');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        };
    </script>
</body>
</html>

</html>
